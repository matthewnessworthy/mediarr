name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build-tauri:
    name: Tauri (${{ matrix.platform }})
    runs-on: ${{ matrix.platform }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: --target universal-apple-darwin
          - platform: ubuntu-latest
            args: ""
          - platform: windows-latest
            args: ""
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - uses: Swatinem/rust-cache@v2

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: crates/mediarr-tauri
          tagName: v__VERSION__
          releaseName: Mediarr v__VERSION__
          releaseBody: "See the assets to download and install this version."
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}

  build-cli:
    name: CLI (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            artifact: mediarr
            asset_name: mediarr-cli-macos-amd64
          - os: ubuntu-latest
            artifact: mediarr
            asset_name: mediarr-cli-linux-amd64
          - os: windows-latest
            artifact: mediarr.exe
            asset_name: mediarr-cli-windows-amd64.exe
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          key: cli

      - name: Build CLI
        run: cargo build --release -p mediarr-cli

      - name: Rename artifact
        shell: bash
        run: cp target/release/${{ matrix.artifact }} ${{ matrix.asset_name }}

      - name: Upload CLI artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: ${{ matrix.asset_name }}

  attach-cli:
    name: Attach CLI to Release
    needs: [build-tauri, build-cli]
    runs-on: ubuntu-latest
    steps:
      - name: Download CLI artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Flatten artifacts
        run: |
          mkdir -p release
          find artifacts -type f -exec cp {} release/ \;
          ls -la release/

      - name: Attach CLI binaries to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          TAG: ${{ github.ref_name }}
        run: |
          echo "Attaching CLI binaries to release $TAG"
          gh release upload "$TAG" release/mediarr-cli-*

  notify-homebrew:
    name: Update Homebrew Tap
    needs: [attach-cli]
    runs-on: ubuntu-latest
    steps:
      - name: Extract version from tag
        id: version
        env:
          TAG: ${{ github.ref_name }}
        run: |
          VERSION="${TAG#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Version: $VERSION"

      - name: Find macOS DMG asset URL
        id: dmg
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          TAG: ${{ github.ref_name }}
        run: |
          DMG_URL=$(gh release view "$TAG" --json assets --jq '.assets[] | select(.name | test("universal\\.dmg$")) | .url')
          if [ -z "$DMG_URL" ]; then
            DMG_URL=$(gh release view "$TAG" --json assets --jq '.assets[] | select(.name | endswith(".dmg")) | .url' | head -1)
          fi
          if [ -z "$DMG_URL" ]; then
            echo "No DMG asset found in release, skipping Homebrew update"
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "dmg_url=$DMG_URL" >> "$GITHUB_OUTPUT"
            echo "DMG URL: $DMG_URL"
          fi

      - name: Dispatch to Homebrew tap
        if: steps.dmg.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          VERSION: ${{ steps.version.outputs.version }}
          DMG_URL: ${{ steps.dmg.outputs.dmg_url }}
        run: |
          gh api repos/matthewnessworthy/homebrew-mediarr/dispatches \
            -f event_type=release-published \
            -f "client_payload[version]=$VERSION" \
            -f "client_payload[dmg_url]=$DMG_URL"
